function selectPkgType(t) {
  window._pkgType = t;
  ['massage', 'training'].forEach(k => {
    const b = document.getElementById('pk-type-' + k);
    if (b) {
      if (k === t) {
        b.style.background = 'var(--accent)';
        b.style.color = 'var(--bg)';
      } else {
        b.style.background = 'var(--surface-2)';
        b.style.color = 'var(--text)';
      }
    }
  });
  // Auto-fill name
  const nameInp = document.getElementById('pk-name');
  if (nameInp && !nameInp.dataset.changed) {
    const total = document.getElementById('pk-total').value || 5;
    nameInp.value = total + '× ' + (t === 'massage' ? 'masáž' : 'trénink');
  }
}

function updatePkgPaidBtns() {
  ['yes', 'no'].forEach(k => {
    const b = document.getElementById('pk-paid-' + k);
    if (b) {
      const isActive = (window._pkgPaid === true && k === 'yes') || (window._pkgPaid === false && k === 'no');
      if (isActive) {
        b.style.background = 'var(--accent)';
        b.style.color = 'var(--bg)';
      } else {
        b.style.background = 'var(--surface-2)';
        b.style.color = 'var(--text)';
      }
    }
  });
}

async function addPackage(clientId) {
  const type = window._pkgType || 'massage';
  const name = document.getElementById('pk-name').value.trim();
  const total = parseInt(document.getElementById('pk-total').value, 10) || 5;
  const price = parseFloat(document.getElementById('pk-price').value) || 0;
  const validity = parseInt(document.getElementById('pk-validity').value, 10) || 6;
  const paid = window._pkgPaid !== false;

  if (!name) { showToast('Zadej název', true); return; }

  const validUntil = new Date();
  validUntil.setMonth(validUntil.getMonth() + validity);

  const data = {
    clientId,
    type,
    name,
    totalSessions: total,
    usedSessions: 0,
    price,
    validUntil: validUntil.getTime(),
    createdAt: Date.now()
  };

  const ref = await fb.ref('studios/' + userData.studioId + '/packages').push(data);

  // Add payment if paid
  if (paid && price > 0) {
    await fb.ref('studios/' + userData.studioId + '/payments').push({
      title: 'Balíček: ' + name,
      amount: price,
      clientId,
      packageId: ref.key,
      kind: 'package',
      at: Date.now()
    });
  }

  closeSheet();
  showToast('Balíček přidán');

  // Find existing reservations to suggest converting
  const reservations = getList('sessions').filter(s => {
    if (s.clientId !== clientId) return false;
    if (s.status !== 'reservation') return false;
    if (new Date(s.start) < new Date()) return false; // only future
    // Match type
    if (type === 'training' && s.type === 'training') return true;
    if (type === 'massage' && (s.type === 'massage_short' || s.type === 'massage_long')) return true;
    return false;
  }).sort((a, b) => new Date(a.start) - new Date(b.start));

  if (reservations.length > 0) {
    setTimeout(() => {
      offerConvertReservations(ref.key, total, reservations);
    }, 600);
  }
}

// Offer to convert reservations to this new package
function offerConvertReservations(packageId, packageTotal, reservations) {
  const toConvert = reservations.slice(0, packageTotal);
  let html = '<div class="sheet-title">Převést rezervace?</div>';
  html += '<div class="sheet-subtitle">vybrat které termíny linkovat k balíčku</div>';
  html += '<div style="background: var(--accent-bg); border: 1px solid rgba(196, 245, 66, 0.2); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: var(--text-2); line-height: 1.5;">';
  html += 'Klient má <strong style="color: var(--accent);">' + reservations.length + '</strong> rezervací. Balíček má <strong style="color: var(--accent);">' + packageTotal + '</strong> lekcí. ';
  html += 'Navrhuju první <strong style="color: var(--accent);">' + Math.min(packageTotal, reservations.length) + '</strong> převést.';
  html += '</div>';

  html += '<div style="max-height: 40vh; overflow-y: auto; margin-bottom: 16px;">';
  reservations.forEach((s, idx) => {
    const isPreSelected = idx < packageTotal;
    const start = new Date(s.start);
    const dateStr = formatDateCZ(start) + ' v ' + formatTimeCZ(start);
    html += '<label style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--hairline); border-radius: 12px; margin-bottom: 6px; cursor: pointer;">';
    html += '<input type="checkbox" id="conv-' + s.id + '" ' + (isPreSelected ? 'checked' : '') + ' style="width: 18px; height: 18px; accent-color: var(--accent);">';
    html += '<div style="flex: 1;">';
    html += '<div style="font-size: 13px; font-weight: 500; color: var(--text);">' + escapeHtml(dateStr) + '</div>';
    html += '<div style="font-family: \'Instrument Serif\', serif; font-style: italic; font-size: 11px; color: var(--text-3);">' + escapeHtml(getSessionTypeName(s.type)) + '</div>';
    html += '</div>';
    html += '</label>';
  });
  html += '</div>';

  // Store ids for callback
  window._convertSessionIds = reservations.map(s => s.id);
  window._convertPackageId = packageId;
  window._convertPackageTotal = packageTotal;

  html += '<button class="btn" onclick="doConvertReservations()">Převést vybrané</button>';
  html += '<button class="btn-text" style="display: block; margin: 12px auto 0;" onclick="closeSheet()">Nepřevádět</button>';
  openSheet(html);
}

async function doConvertReservations() {
  const ids = window._convertSessionIds || [];
  const packageId = window._convertPackageId;
  const packageTotal = window._convertPackageTotal;
  if (!packageId) return;

  let count = 0;
  for (const id of ids) {
    const cb = document.getElementById('conv-' + id);
    if (!cb || !cb.checked) continue;
    if (count >= packageTotal) break;
    await fb.ref('studios/' + userData.studioId + '/sessions/' + id).update({
      status: 'planned',
      packageId: packageId,
      price: 0
    });
    count++;
  }
  closeSheet();
  showToast('Převedeno ' + count + ' termínů');
}

// ============================================================
function showShareSession(sessionId) {
  const s = (studioData.sessions || {})[sessionId];
  if (!s) return;
  const client = s.clientId ? getClient(s.clientId) : null;

  // Build message text
  const start = new Date(s.start);
  const typeInfo = getSessionTypeInfo(s.type);
  const myName = getMyName();
  const tone = client && client.tone === 'vykani' ? 'vykani' : 'tykani';
  const greeting = tone === 'vykani' ? 'Dobrý den' : 'Ahoj';
  const sign = tone === 'vykani' ? 'S pozdravem,\n' + myName : myName;

  let msg = greeting;
  if (client) msg += ' ' + client.name.split(' ')[0];
  msg += ',\n\n';
  if (tone === 'vykani') {
    msg += 'potvrzuji termín — ' + typeInfo.name + '\n';
    msg += '🗓 ' + formatDateCZ(start) + ', ' + formatTimeCZ(start);
  } else {
    msg += 'potvrzuju ti termín — ' + typeInfo.name + '\n';
    msg += '🗓 ' + formatDateCZ(start) + ' v ' + formatTimeCZ(start);
  }
  if (s.location) msg += '\n📍 ' + s.location;
  msg += '\n\n' + sign;

  let html = '<div class="sheet-title">Sdílet termín</div>';
  html += '<div class="sheet-subtitle">vyber kanál</div>';

  // Show preview
  html += '<div style="background: var(--bg-2); border: 1px solid var(--hairline); border-radius: 14px; padding: 14px; margin-bottom: 16px; font-family: \'Inter\', sans-serif; font-size: 13px; line-height: 1.6; color: var(--text-2); white-space: pre-line;">' + escapeHtml(msg) + '</div>';

  if (client && client.phone) {
    const phone = client.phone.replace(/[^+\d]/g, '');

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('Zkopírováno');
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Zkopírováno'); } catch (e2) {}
    document.body.removeChild(ta);
  }
}

function exportSessionToICS(sessionId) {
  const s = (studioData.sessions || {})[sessionId];
  if (!s) { showToast('Termín nenalezen', true); return; }
  const client = s.clientId ? getClient(s.clientId) : null;
  const typeInfo = getSessionTypeInfo(s.type);

  const start = new Date(s.start);
  const end = s.end ? new Date(s.end) : new Date(start.getTime() + 60*60*1000);

  function icsDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return y + m + day + 'T' + h + mi + '00';
  }
  function icsEsc(s) {
    if (!s) return '';
    return String(s).replace(/\\/g, '\\\\').replace(/,/g, '\\,').replace(/;/g, '\\;').replace(/\n/g, '\\n');
  }

  const uid = 'pulse-' + sessionId + '@pulse.app';
  const dtStamp = icsDate(new Date()) + 'Z';
  const summary = typeInfo.name + (client ? ' — ' + client.name : '');

  let ics = 'BEGIN:VCALENDAR\r\n';
  ics += 'VERSION:2.0\r\n';
  ics += 'PRODID:-//Pulse//CS\r\n';
  ics += 'CALSCALE:GREGORIAN\r\n';
  ics += 'METHOD:PUBLISH\r\n';
  ics += 'BEGIN:VEVENT\r\n';
  ics += 'UID:' + uid + '\r\n';
  ics += 'DTSTAMP:' + dtStamp + '\r\n';
  ics += 'DTSTART:' + icsDate(start) + '\r\n';
  ics += 'DTEND:' + icsDate(end) + '\r\n';
  ics += 'SUMMARY:' + icsEsc(summary) + '\r\n';
  if (s.location) ics += 'LOCATION:' + icsEsc(s.location) + '\r\n';
  if (s.notes) ics += 'DESCRIPTION:' + icsEsc(s.notes) + '\r\n';
  ics += 'BEGIN:VALARM\r\nTRIGGER:-PT60M\r\nACTION:DISPLAY\r\nDESCRIPTION:Připomínka\r\nEND:VALARM\r\n';
  ics += 'END:VEVENT\r\nEND:VCALENDAR\r\n';

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const filename = (typeInfo.name + (client ? '_' + client.name : '')).replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 30) + '.ics';
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  vibrate(15);
  showToast('Soubor stažen');
  closeSheet();
}

    html += '<button onclick="window._catColor=\'' + c + '\'; updateCatColorBtns()" id="cat-c-' + c.replace('#', '') + '" style="aspect-ratio: 1; border-radius: 10px; background: ' + c + '; border: 2px solid var(--hairline); cursor: pointer;"></button>';
  });
  html += '</div></div>';
  html += '<div class="field-row" style="margin-top: 16px;">';
  html += '<button class="btn" onclick="updateCategory(\'' + catId + '\')">Uložit</button>';
  html += '<button class="btn danger" onclick="confirmDeleteCategory(\'' + catId + '\')">Smazat</button>';
  html += '</div>';
  openSheet(html);
  setTimeout(() => {
    window._catColor = cat.color || '#C4F542';
    updateCatColorBtns();
  }, 100);
}

async function updateCategory(catId) {
  const name = document.getElementById('cat-name').value.trim();
  const loc = document.getElementById('cat-loc').value.trim();
  if (!name) { showToast('Zadej název', true); return; }
  await fb.ref('studios/' + userData.studioId + '/settings/categories/' + catId).update({
    name,
    defaultLocation: loc || null,
    color: window._catColor || '#C4F542'
  });
  closeSheet();
  showToast('Uloženo');
  setTimeout(() => showCategoriesAndServicesSheet(), 300);
}

function confirmDeleteCategory(catId) {
  const services = getServicesForCategory(catId);
  let warning = '';
  if (services.length > 0) {
    warning = '<div style="background: rgba(255, 90, 90, 0.1); border: 1px solid rgba(255, 90, 90, 0.3); border-radius: 12px; padding: 12px 14px; margin: 12px 0; font-size: 12px; color: var(--text-2);">⚠ Smaže se i ' + services.length + ' služeb v této kategorii.</div>';
  }
  openSheet(`
    <div class="sheet-title">Smazat kategorii?</div>
    ${warning}
    <button class="btn danger" onclick="deleteCategory('${catId}')">Ano, smazat</button>
    <button class="btn secondary" style="margin-top: 8px;" onclick="closeSheet()">Zpět</button>
  `);
}

async function deleteCategory(catId) {
  // Delete category + its services
  const services = getServicesForCategory(catId);
  for (const s of services) {
    await fb.ref('studios/' + userData.studioId + '/settings/services/' + s.id).remove();
  }
  await fb.ref('studios/' + userData.studioId + '/settings/categories/' + catId).remove();
  closeSheet();
  showToast('Smazáno', true);
  setTimeout(() => showCategoriesAndServicesSheet(), 300);
}

// ----------- SERVICE -----------
function showAddServiceSheet(categoryId) {
  const cat = getCategory(categoryId);
  if (!cat) return;
  let html = '<div class="sheet-title">Nová služba</div>';
  html += '<div class="sheet-subtitle">do kategorie ' + escapeHtml(cat.name) + '</div>';
  html += '<div class="field"><label>Název</label><input type="text" id="svc-name" placeholder="např. Sportovní masáž 60 min" autofocus></div>';
  html += '<div class="field-row">';
  html += '<div class="field"><label>Délka (min)</label><input type="number" id="svc-duration" value="60" min="15" step="5"></div>';
  html += '<div class="field"><label>Cena (Kč)</label><input type="number" id="svc-price" value="0"></div>';
  html += '</div>';
  html += '<button class="btn" style="margin-top: 16px;" onclick="addService(\'' + categoryId + '\')">Přidat službu</button>';
  openSheet(html);
}

async function addService(categoryId) {
  const name = document.getElementById('svc-name').value.trim();
  const duration = parseInt(document.getElementById('svc-duration').value, 10) || 60;
  const price = parseFloat(document.getElementById('svc-price').value) || 0;
  if (!name) { showToast('Zadej název', true); return; }
  const id = 'svc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
  const existing = getServicesForCategory(categoryId);
  await fb.ref('studios/' + userData.studioId + '/settings/services/' + id).set({
    categoryId,
    name,
    duration,
    price,
    order: existing.length + 1,
    createdAt: Date.now()
  });
  closeSheet();
  showToast('Služba přidána');
  setTimeout(() => showCategoriesAndServicesSheet(), 300);
}

function showEditServiceSheet(serviceId) {
  const svc = getService(serviceId);
  if (!svc) return;
  let html = '<div class="sheet-title">Upravit službu</div>';
  html += '<div class="field"><label>Název</label><input type="text" id="svc-name" value="' + escapeHtml(svc.name) + '"></div>';
  html += '<div class="field-row">';

  html += '<div class="field"><label>Cena (Kč)</label><input type="number" id="svc-price" value="' + svc.price + '"></div>';
  html += '</div>';
  html += '<div class="field-row" style="margin-top: 16px;">';
  html += '<button class="btn" onclick="updateService(\'' + serviceId + '\')">Uložit</button>';
  html += '<button class="btn danger" onclick="deleteService(\'' + serviceId + '\')">Smazat</button>';
  html += '</div>';
  openSheet(html);
}

async function updateService(serviceId) {
  const name = document.getElementById('svc-name').value.trim();
  const duration = parseInt(document.getElementById('svc-duration').value, 10) || 60;
  const price = parseFloat(document.getElementById('svc-price').value) || 0;
  if (!name) { showToast('Zadej název', true); return; }

  });
  closeSheet();
  showToast('Uloženo');
  setTimeout(() => showCategoriesAndServicesSheet(), 300);

async function deleteService(serviceId) {
  await fb.ref('studios/' + userData.studioId + '/settings/services/' + serviceId).remove();
  closeSheet();
  showToast('Smazáno', true);
  setTimeout(() => showCategoriesAndServicesSheet(), 300);

// LEGACY: showSessionTypesSheet (kept for backwards compat)

function showSessionTypesSheet() {
  // Redirect to new categories sheet
  showCategoriesAndServicesSheet();

function showRentsSheet() {
  const settings = getSettings();
  const rents = settings.rents || {};
  let html = '<div class="sheet-title">Nájemné</div>';
  html += '<div class="sheet-subtitle">každý měsíc se přičte k výdajům</div>';

  ['fitlife', 'bodyment'].forEach(key => {
    const r = rents[key] || {};
    const label = key === 'fitlife' ? 'Fit Life — fitko' : 'Bodyment — masérský salon';
    html += '<div style="background: var(--bg-2); border: 1px solid var(--hairline); border-radius: 12px; padding: 14px; margin-bottom: 8px;">';
    html += '<div style="font-family: \'Inter\', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 8px;">' + escapeHtml(label) + '</div>';
    html += '<div class="field-row">';
    html += '<div class="field"><label>Částka (Kč)</label><input type="number" id="rent-' + key + '-amount" value="' + (r.amount || 0) + '"></div>';
    html += '<div class="field"><label>Den splatnosti</label><input type="number" id="rent-' + key + '-day" value="' + (r.dayOfMonth || 1) + '" min="1" max="28"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '<button class="btn" onclick="updateRents()">Uložit</button>';
  html += '<button class="btn secondary" style="margin-top: 8px;" onclick="addRentExpensesNow()">Přidat tento měsíc do výdajů</button>';
  openSheet(html);
}

async function updateRents() {
  const updates = {};
  ['fitlife', 'bodyment'].forEach(key => {
    const amount = parseFloat(document.getElementById('rent-' + key + '-amount').value) || 0;
    const day = parseInt(document.getElementById('rent-' + key + '-day').value, 10) || 1;
    const name = key === 'fitlife' ? 'Fit Life — nájem' : 'Bodyment — nájem';
    updates[key] = { name, amount, dayOfMonth: day };
  });
  await fb.ref('studios/' + userData.studioId + '/settings/rents').set(updates);
  closeSheet();
  showToast('Uloženo');
}

async function addRentExpensesNow() {
  const settings = getSettings();
  const rents = settings.rents || {};
  let added = 0;
  for (const key of ['fitlife', 'bodyment']) {
    const r = rents[key];
    if (!r || !r.amount) continue;
    await fb.ref('studios/' + userData.studioId + '/expenses').push({
      title: r.name,
      amount: r.amount,
      category: 'nájem',
      at: Date.now()
    });
    added++;
  }
  closeSheet();
  showToast(added > 0 ? 'Přidáno ' + added + ' nájmů' : 'Není co přidat', added === 0);
}

// ============================================================
// REMINDERS
// ============================================================
function showRemindersSheet() {
  const reminders = getList('reminders').sort((a, b) => (a.at || 0) - (b.at || 0));
  let html = '<div class="sheet-title">Připomínky</div>';
  html += '<div class="sheet-subtitle">co si potřebuješ pamatovat</div>';
  html += '<div class="field"><input type="text" id="rem-text" placeholder="Zavolat dodavateli olejů..."></div>';
  html += '<div class="field"><label>Datum (volitelné)</label><input type="date" id="rem-date"></div>';
  html += '<button class="btn" onclick="addReminder()">Přidat připomínku</button>';

  if (reminders.length > 0) {
    html += '<div style="margin-top: 24px;">';
    html += '<div class="section-label" style="padding: 0;">A K T I V N Í</div>';
    reminders.filter(r => !r.done).forEach(r => {
      html += '<div style="background: var(--bg-2); border: 1px solid var(--hairline); border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;">';
      html += '<div style="flex: 1;">';
      html += '<div style="font-size: 13px; font-weight: 500;">' + escapeHtml(r.text) + '</div>';
      if (r.at) html += '<div style="font-family: \'Instrument Serif\', serif; font-style: italic; font-size: 11px; color: var(--text-3); margin-top: 2px;">' + formatDateCZ(new Date(r.at)) + '</div>';
      html += '</div>';
      html += '<button class="btn-icon" onclick="markReminderDone(\'' + r.id + '\')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>';
      html += '</div>';
    });
    html += '</div>';
  }
  openSheet(html);
}

async function addReminder() {
  const text = document.getElementById('rem-text').value.trim();
  const date = document.getElementById('rem-date').value;
  if (!text) { showToast('Zadej text', true); return; }
  await fb.ref('studios/' + userData.studioId + '/reminders').push({
    text,
    at: date ? new Date(date + 'T09:00:00').getTime() : null,
    done: false,
    createdAt: Date.now()
  });
  closeSheet();
  showToast('Přidáno');
}

async function markReminderDone(id) {
  await fb.ref('studios/' + userData.studioId + '/reminders/' + id).update({ done: true });
  showToast('Hotovo');
}

function generateIGPost(theme) {
  let post = '';
  if (theme === 'package_offer') {
    post = '✨ NOVÁ NABÍDKA ✨\n\nPřidej se k nám a využij zvýhodněné balíčky!\n\n💆‍♀️ 5× sportovní masáž — sleva 10%\n🏋️ 10× trénink — sleva 15%\n\nPříjemný relax nebo pevné tělo — co potřebuješ víc? 💚\n\nNapiš mi do DM ✉️\n\n#bodyment #fitlife #plzen #masaze #trener #katrin';
  } else if (theme === 'free_slot') {
    post = '⏰ VOLNÝ TERMÍN ⏰\n\nMám pro tebe volné okno tento týden!\n\n🗓️ [doplň datum]\n⏰ [doplň čas]\n📍 [Bodyment / Fit Life]\n\nKdo je první, ten bere 💚\n\nDM nebo SMS — rychle ✉️\n\n#bodyment #fitlife #plzen #masaze #trener';
  } else if (theme === 'motivation') {
    const quotes = [
      'Tvoje tělo si zaslouží péči, ne dril.',
      'Každá lekce, kterou si dáš, je krok vpřed.',
      'Sportu se neříká NE, sportu se říká KDY.',
      'Síla není o tom kolik zvedneš. Je o tom kolikrát se vrátíš.',
      'Tvoje budoucí já tě bude milovat za to, co děláš dnes.'
    ];
    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    post = '"' + quote + '"\n\n💚\n\n#motivace #fitlife #bodyment #plzen #trener #katrin';
  } else if (theme === 'tip') {
    const tips = [
      '💧 Tip dne: Pij vodu už ráno před kávou. Tělo si poděkuje.',
      '🧘 Tip dne: 5 minut hlubokého dýchání po tréninku — regenerace začíná tady.',
      '💪 Tip dne: Strečink po každé lekci přidá léta životu tvých svalů.',
      '😴 Tip dne: Spánek je nejvíc podceňovaný "doplněk". Sport bez něj nefunguje.'
    ];
    const tip = tips[Math.floor(Math.random() * tips.length)];
    post = tip + '\n\n💚\n\n#tipdne #bodyment #fitlife #plzen #zdravi';
  }

  let html = '<div class="sheet-title">Tvůj příspěvek</div>';
  html += '<div class="sheet-subtitle">zkopíruj a vlož na Instagram</div>';
  html += '<div style="background: var(--bg-2); border: 1px solid var(--hairline); border-radius: 14px; padding: 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.7; white-space: pre-line;">' + escapeHtml(post) + '</div>';
  html += '<button class="btn" onclick="copyToClipboard(' + JSON.stringify(post).replace(/"/g, '&quot;') + '); closeSheet();">Zkopírovat text</button>';
  html += '<button class="btn secondary" style="margin-top: 8px;" onclick="showInstagramGenerator()">‹ Zpět na výběr</button>';
  openSheet(html);
}
