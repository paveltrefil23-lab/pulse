<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pulse">
<meta name="theme-color" content="#0a0a0a">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0a'/%3E%3Cpath d='M40 90 Q 60 60, 75 90 T 105 90 T 140 90' stroke='%23C4F542' stroke-width='8' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Pulse%22%2C%22short_name%22%3A%22Pulse%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0a%22%2C%22theme_color%22%3A%22%230a0a0a%22%2C%22orientation%22%3A%22portrait%22%7D">
<title>Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PULSE — Trainer & Masseuse App
   Sport / Tech vibe with lime green accent
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --bg-2: #141414;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --surface-3: #2e2e2e;
  --text: #f5f5f5;
  --text-2: #a8a8a8;
  --text-3: #6a6a6a;
  --accent: #C4F542;
  --accent-soft: #9DCB35;
  --accent-bg: rgba(196, 245, 66, 0.1);
  --hairline: rgba(255, 255, 255, 0.06);
  --hairline-strong: rgba(255, 255, 255, 0.12);
  --positive: #8FE000;
  --warning: #F5C842;
  --danger: #FF5A5A;
  --info: #4A9EFF;
}

html, body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body { padding-bottom: env(safe-area-inset-bottom, 0); }

::-webkit-scrollbar { width: 0; display: none; }
* { scrollbar-width: none; }

input, textarea, select, button { font-family: inherit; }

.hidden { display: none !important; }

/* ============== APP ============== */
.app {
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ============== HEADER ============== */
.page-header {
  padding: env(safe-area-inset-top, 16px) 20px 16px;
  padding-top: max(env(safe-area-inset-top, 16px), 16px);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 30;
}

.btn-back, .btn-icon {
  width: 40px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  color: var(--text);
}

.btn-back:active, .btn-icon:active { transform: scale(0.94); background: var(--surface-2); }

.btn-back svg, .btn-icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.page-title {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
  flex: 1;
}

/* ============== HOME / DNES ============== */
.home-top {
  padding: 8px 20px 24px;
}

.home-greeting-line {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}

.home-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.home-greeting {
  font-family: 'Inter', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
  color: var(--text);
}

.home-greeting .accent {
  color: var(--accent);
}

.home-greeting .italic {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
}

.home-subtitle {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--text-2);
  margin-top: 6px;
}

/* ============== STAT CARDS ============== */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 20px 12px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 16px;
  padding: 16px;
}

.stat-card.accent {
  background: var(--accent-bg);
  border-color: rgba(196, 245, 66, 0.3);
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.stat-card.accent .stat-label { color: var(--accent); }

.stat-value {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}

.stat-card.accent .stat-value { color: var(--accent); }

.stat-sub {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-3);
  margin-top: 4px;
}

/* ============== SECTION ============== */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 0 20px;
  margin-bottom: 12px;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::before {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
}

.section-content { padding: 0 20px; }

/* ============== HAIRLINE ============== */
.hairline {
  height: 1px;
  background: var(--hairline);
  margin: 24px 20px;
  border: none;
}

/* ============== SESSION ROW (timeline event) ============== */
.session-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.session-row:active {
  transform: scale(0.99);
  border-color: var(--hairline-strong);
}

.session-row.done {
  opacity: 0.55;
}

.session-row.done .session-title {
  text-decoration: line-through;
  text-decoration-color: var(--text-3);
}

.session-row.reservation {
  border-style: dashed;
  border-color: var(--text-3);
  background: var(--bg-2);
}

.session-row.reservation .session-type-bar {
  background: repeating-linear-gradient(0deg, var(--text-3) 0, var(--text-3) 4px, transparent 4px, transparent 8px) !important;
}

.session-row.reservation .session-client-name {
  color: var(--text-2);
}

/* Type indicator (left bar) */
.session-type-bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--accent);
}

.session-row.type-massage .session-type-bar { background: #B66BF5; }
.session-row.type-training .session-type-bar { background: var(--accent); }
.session-row.type-consultation .session-type-bar { background: var(--info); }

.session-time {
  font-family: 'JetBrains Mono', monospace;
  font-feature-settings: "tnum";
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  flex-shrink: 0;
  min-width: 50px;
  padding-left: 6px;
}

.session-time-end {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  font-weight: 400;
  margin-top: 1px;
}

.session-content { flex: 1; min-width: 0; }

.session-client-name {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
  margin-bottom: 2px;
}

.session-meta {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.session-type-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
}

.session-type-pill.massage {
  background: rgba(182, 107, 245, 0.15);
  color: #C795F8;
}

.session-type-pill.training {
  background: var(--accent-bg);
  color: var(--accent);
}

.session-type-pill.consultation {
  background: rgba(74, 158, 255, 0.15);
  color: var(--info);
}

/* ============== BUTTONS ============== */
.btn {
  font-family: 'Inter', sans-serif;
  border: none;
  border-radius: 14px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: var(--bg);
  letter-spacing: -0.1px;
  transition: transform 0.15s;
  width: 100%;
}

.btn:active { transform: scale(0.98); }

.btn.secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--hairline);
}

.btn.danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(255, 90, 90, 0.3);
}

.btn-text {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  text-decoration: underline;
  text-decoration-color: var(--hairline);
  text-underline-offset: 3px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}

.btn-text:active { color: var(--accent); }

/* ============== INPUTS ============== */
input, textarea, select {
  background: var(--bg-2);
  color: var(--text);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  font-family: 'Inter', sans-serif;
}

input:focus, textarea:focus, select:focus { border-color: var(--accent); }

input::placeholder, textarea::placeholder {
  color: var(--text-3);
  font-family: 'Instrument Serif', serif;
  font-style: italic;
}

input[type="date"], input[type="time"], input[type="number"] {
  color-scheme: dark;
}

textarea { resize: vertical; min-height: 80px; }

label, .field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}

.field { margin-bottom: 14px; }

.field-row { display: flex; gap: 8px; }
.field-row > * { flex: 1; }

/* ============== CHIPS / TABS ============== */
.chips {
  display: flex;
  gap: 6px;
  padding: 0 20px 16px;
  overflow-x: auto;
}

.chip {
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  letter-spacing: -0.1px;
}

.chip.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.tabs {
  display: flex;
  padding: 0 20px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--hairline);
}

.tab {
  flex: 1;
  text-align: center;
  padding: 14px 0;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.1px;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ============== AVATAR ============== */
.avatar {
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}

.avatar.size-sm { width: 32px; height: 32px; font-size: 13px; }
.avatar.size-md { width: 48px; height: 48px; font-size: 18px; }
.avatar.size-lg { width: 64px; height: 64px; font-size: 24px; }
.avatar.size-xl { width: 96px; height: 96px; font-size: 38px; letter-spacing: -1px; }

/* ============== CLIENT ROW ============== */
.client-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.client-row:active { transform: scale(0.99); border-color: var(--hairline-strong); }

.client-content { flex: 1; min-width: 0; }

.client-name {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
  margin-bottom: 2px;
}

.client-meta {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-2);
}

.client-package-pill {
  background: var(--accent-bg);
  border: 1px solid rgba(196, 245, 66, 0.2);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.client-package-pill.warn {
  background: rgba(245, 200, 66, 0.12);
  border-color: rgba(245, 200, 66, 0.25);
  color: var(--warning);
}

.client-package-pill.empty {
  background: var(--surface-2);
  border-color: var(--hairline);
  color: var(--text-3);
}

/* ============== PACKAGE CARD ============== */
.package-card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
}

.package-card.expired { opacity: 0.5; }

.package-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  transition: width 0.4s;
}

.package-card.warn .package-progress-bar { background: var(--warning); }
.package-card.expired .package-progress-bar { background: var(--text-3); }

.package-name {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}

.package-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.package-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.package-counter .total {
  color: var(--text-3);
  font-size: 14px;
  margin-left: 2px;
}

.package-meta {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-3);
}

/* ============== FAB ============== */
.fab {
  position: fixed;
  bottom: 96px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  z-index: 50;
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.2),
    0 8px 24px rgba(196, 245, 66, 0.3),
    0 24px 48px rgba(196, 245, 66, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.fab:active { transform: scale(0.92); }

.fab svg {
  width: 22px;
  height: 22px;
  stroke: var(--bg);
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ============== BOTTOM NAV ============== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-top: 1px solid var(--hairline);
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 12px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 40;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-3);
  cursor: pointer;
  padding: 6px 8px;
  background: none;
  border: none;
  flex: 1;
  transition: color 0.2s;
}

.nav-item.active { color: var(--accent); }

.nav-item svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: -0.1px;
  font-family: 'Inter', sans-serif;
}

/* ============== TOAST ============== */
.toast {
  position: fixed;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: var(--bg);
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  box-shadow: 0 8px 32px rgba(196, 245, 66, 0.4);
  white-space: nowrap;
  max-width: 90%;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.1px;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.danger {
  background: var(--danger);
  color: white;
  box-shadow: 0 8px 32px rgba(255, 90, 90, 0.4);
}

/* ============== SHEET / MODAL ============== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.sheet-backdrop.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 12px 20px 32px;
  z-index: 110;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 92vh;
  overflow-y: auto;
  padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
  border-top: 1px solid var(--hairline);
}

.sheet.show { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.sheet-title {
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.6px;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
}

.sheet-subtitle {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 24px;
}

.sheet-action {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--bg-2);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform 0.15s;
  width: 100%;
  text-align: left;
}

.sheet-action:active { transform: scale(0.98); }

.sheet-action-icon {
  width: 40px;
  height: 40px;

<script>
// Firebase wrapper shim
window.fb = {
  init: (config) => firebase.initializeApp(config),
  auth: () => firebase.auth(),
  db: () => firebase.database(),
  ref: (path) => firebase.database().ref(path)

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCEfeDocqFq02Y3hujAvGyh71s7TNdLS8Q",
  authDomain: "pulse-9855d.firebaseapp.com",
  databaseURL: "https://pulse-9855d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pulse-9855d",
  storageBucket: "pulse-9855d.firebasestorage.app",
  messagingSenderId: "212429221583",
  appId: "1:212429221583:web:0df8df1ea5115cdb4ed1ba"
};

let currentUser = null;
let userData = null;
let studioData = {};
let currentScreen = 'home';
let currentFilter = 'all';
let currentTab = 'inkasovano';
let calendarSelectedDate = null;
let calendarViewMode = 'week'; // 'week' | 'month'
let detailContext = null; // { type: 'client'|'session', id }
let clientSearchQuery = '';

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  try {
    fb.init(FIREBASE_CONFIG);
    fb.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadUserData();
      } else {
        currentUser = null;
        userData = null;
        showScreen('login');
      }
    });
  } catch (e) {
    alert('Chyba Firebase: ' + e.message);
    showScreen('login');
  }

  window.addEventListener('online', () => document.getElementById('conn-status').classList.add('hidden'));
  window.addEventListener('offline', () => document.getElementById('conn-status').classList.remove('hidden'));
});

function showScreen(name) {
  ['login-screen', 'main-app'].forEach(s => document.getElementById(s).classList.add('hidden'));
  if (name === 'login') document.getElementById('login-screen').classList.remove('hidden');
  else if (name === 'main') document.getElementById('main-app').classList.remove('hidden');
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-panel').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-panel').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  try {
    await fb.auth().signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const pass2 = document.getElementById('reg-password2').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Zadej jméno'; return; }
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  if (pass.length < 6) { err.textContent = 'Heslo musí mít alespoň 6 znaků'; return; }
  if (pass !== pass2) { err.textContent = 'Hesla se neshodují'; return; }
  try {
    const cred = await fb.auth().createUserWithEmailAndPassword(email, pass);
    // Create user record + studio record
    const uid = cred.user.uid;
    const studioId = 'studio_' + uid.substring(0, 12);
    await fb.ref('users/' + uid).set({
      name, email, studioId, createdAt: Date.now()
    });
    await fb.ref('studios/' + studioId).set({
      owner: uid,
      name: name + ' Studio',
      createdAt: Date.now(),
      clients: {},
      sessions: {},
      packages: {},
      payments: {},
      expenses: {},
      reminders: {},
      settings: {
        currency: 'Kč',
        sessionTypes: {
          training: { name: 'Trénink', defaultDuration: 60, defaultPrice: 0, color: '#C4F542' },
          massage_short: { name: 'Masáž šíje a trapézů', defaultDuration: 30, defaultPrice: 450, color: '#B66BF5' },
          massage_long: { name: 'Sportovní masáž', defaultDuration: 60, defaultPrice: 950, color: '#B66BF5' },
          consultation: { name: 'Konzultace', defaultDuration: 30, defaultPrice: 0, color: '#4A9EFF' }
        },
        addresses: {
          training: 'Fit Life Doubravka',
          massage: 'Bodyment, Plzeň'
        },
        rents: {
          fitlife: { name: 'Fit Life — nájem', amount: 0, dayOfMonth: 1 },
          bodyment: { name: 'Bodyment — nájem', amount: 0, dayOfMonth: 1 }
        }
      }
    });
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function resetPassword() {
  const email = document.getElementById('login-email').value.trim();
  const err = document.getElementById('login-error');
  if (!email) { err.textContent = 'Zadej email pro reset'; return; }
  try {
    await fb.auth().sendPasswordResetEmail(email);
    err.textContent = 'Odkaz na reset hesla odeslán';
    err.style.color = 'var(--accent)';
    setTimeout(() => { err.style.color = ''; err.textContent = ''; }, 4000);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

function translateAuthErr(code) {
  const map = {
    'auth/invalid-email': 'Neplatný email',
    'auth/user-not-found': 'Uživatel neexistuje',
    'auth/wrong-password': 'Špatné heslo',
    'auth/invalid-credential': 'Špatný email nebo heslo',
    'auth/email-already-in-use': 'Tento email je už zaregistrovaný',
    'auth/weak-password': 'Slabé heslo (min. 6 znaků)',
    'auth/network-request-failed': 'Chyba připojení k internetu',
    'auth/too-many-requests': 'Příliš mnoho pokusů, zkus později'
  };
  return map[code] || 'Chyba: ' + code;
}

async function logout() {
  try { await fb.auth().signOut(); } catch (e) {}
}

// ============================================================
// USER DATA & STUDIO
// ============================================================
async function loadUserData() {
  try {
    const snap = await fb.ref('users/' + currentUser.uid).once('value');
    userData = snap.val();
    if (!userData || !userData.studioId) {
      showToast('Chyba načítání profilu', true);
      return;
    }
    subscribeToStudio();
    showScreen('main');
    renderScreen();
  } catch (e) {
    console.error('loadUserData', e);
    showScreen('login');
  }
}

function subscribeToStudio() {
  if (!userData || !userData.studioId) return;
  let firstLoad = true;
  fb.ref('studios/' + userData.studioId).on('value', snap => {
    studioData = snap.val() || {};
    if (currentScreen) renderScreen();
    if (firstLoad) {
      firstLoad = false;
      // Initialize default categories on first load if missing
      setTimeout(() => ensureDefaultCategories(), 800);
    }
  });
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function getList(name) {
  const v = studioData[name];
  if (!v) return [];
  return Object.keys(v).map(k => ({ id: k, ...v[k] }));
}

function getStudioName() {
  return (studioData.name) || ((userData && userData.name) || 'Studio');
}

function getMyName() {
  return (userData && userData.name) || 'Trenérka';
}

function getInitial(name) {
  if (!name) return '?';
  return String(name).trim().charAt(0).toUpperCase() || '?';
}

function getSettings() { return studioData.settings || {}; }

function getSessionTypes() { return (getSettings()).sessionTypes || {}; }

function getSessionTypeInfo(typeId) {

  return types[typeId] || { name: 'Lekce', defaultDuration: 60, defaultPrice: 0, color: '#C4F542' };

// ============================================================
// Get all categories (sorted by order, then name)
function getCategories() {
  const cats = (getSettings()).categories || {};
  return Object.keys(cats).map(k => ({ id: k, ...cats[k] }))
    .sort((a, b) => (a.order || 0) - (b.order || 0) || (a.name || '').localeCompare(b.name || '', 'cs'));
}

// Get a specific category
function getCategory(categoryId) {
  const cats = (getSettings()).categories || {};
  return cats[categoryId] ? { id: categoryId, ...cats[categoryId] } : null;
}

// Get all services (across all categories)
function getServices() {
  const svc = (getSettings()).services || {};
  return Object.keys(svc).map(k => ({ id: k, ...svc[k] }));
}

// Get services for a specific category
function getServicesForCategory(categoryId) {
  return getServices()
    .filter(s => s.categoryId === categoryId)
    .sort((a, b) => (a.order || 0) - (b.order || 0) || (a.name || '').localeCompare(b.name || '', 'cs'));
}

// Get a specific service
function getService(serviceId) {
  const svc = (getSettings()).services || {};
  return svc[serviceId] ? { id: serviceId, ...svc[serviceId] } : null;
}

// Backwards-compat: get type info from session
// Sessions store either { categoryId, serviceId } (new) or { type } (old)
function getSessionDisplay(s) {
  if (s.serviceId) {
    const service = getService(s.serviceId);
    const cat = service ? getCategory(service.categoryId) : null;
    return {
      name: service ? service.name : 'Služba',
      categoryName: cat ? cat.name : '',
      categoryId: service ? service.categoryId : null,
      serviceId: s.serviceId,
      duration: service ? service.duration : 60,
      price: service ? service.price : 0,
      color: cat ? cat.color : '#C4F542',
      icon: cat ? cat.icon : 'training'
    };
  }
  // Old format fallback
  const t = s.type;
  if (t) {
    const old = getSessionTypeInfo(t);
    let icon = 'training';
    if (t === 'massage_short' || t === 'massage_long') icon = 'massage';
    else if (t === 'consultation') icon = 'consultation';
    return {
      name: old.name,
      categoryName: '',
      categoryId: null,
      serviceId: null,
      duration: old.defaultDuration || 60,
      price: old.defaultPrice || 0,
      color: old.color || '#C4F542',
      icon
    };
  }
  return { name: 'Lekce', categoryName: '', duration: 60, price: 0, color: '#C4F542', icon: 'training' };
}

function getCategoryIconClass(iconName) {
  if (iconName === 'massage') return 'massage';
  if (iconName === 'consultation') return 'consultation';

}

function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '0 Kč';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ') + ' Kč';
}

function fmtNumOnly(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ');
}

function dateKey(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  return d.getDate() + '. ' + months[d.getMonth()];
}

function formatTimeCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  const hour = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);
  if (min < 1) return 'právě teď';
  if (min < 60) return 'před ' + min + ' min';
  if (hour < 24) return 'před ' + hour + ' h';
  if (day < 7) return 'před ' + day + (day === 1 ? ' dnem' : ' dny');
  return new Date(ts).toLocaleDateString('cs-CZ');
}

function vibrate(p) { try { if (navigator.vibrate) navigator.vibrate(p); } catch (e) {} }

function showToast(msg, danger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('danger', !!danger);
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

function navTo(screen) {
  vibrate(8);
  currentScreen = screen;
  detailContext = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector('.nav-item[data-target="' + screen + '"]');
  if (navItem) navItem.classList.add('active');
  renderScreen();
  window.scrollTo(0, 0);
}

function goDetail(type, id) {
  detailContext = { type, id };
  currentScreen = type + '-detail';
  renderScreen();
  window.scrollTo(0, 0);
}

function goBack() {
  if (detailContext) {
    const t = detailContext.type;
    detailContext = null;
    if (t === 'client') currentScreen = 'clients';
    else if (t === 'session') currentScreen = 'calendar';
    else currentScreen = 'home';
  } else {
    currentScreen = 'home';
  }
  renderScreen();
  window.scrollTo(0, 0);
}

// RENDER DISPATCHER
// ============================================================
function renderScreen() {
  const c = document.getElementById('screen-container');
  let html = '';
  switch (currentScreen) {
    case 'home': html = renderHome(); break;
    case 'calendar': html = renderCalendar(); break;
    case 'clients': html = renderClients(); break;
    case 'finance': html = renderFinance(); break;
    case 'more': html = renderMore(); break;
    case 'client-detail': html = renderClientDetail(); break;
    case 'session-detail': html = renderSessionDetail(); break;
    default: html = renderHome();
  }
  c.innerHTML = '<div class="screen">' + html + '</div>';
  // Reset FAB
  setTimeout(() => {
    const fab = document.getElementById('fab');
    if (fab) fab.onclick = onFabClick;
  }, 50);
}


// ============================================================
// ENTITY HELPERS
// ============================================================
function getClient(id) {
  const clients = studioData.clients || {};
  return clients[id] ? { id, ...clients[id] } : null;
}

function getClientName(id) {
  const c = getClient(id);
  return c ? c.name : 'Neznámý klient';
}

// Get all sessions sorted by start time
function getSessions() {
  return getList('sessions').sort((a, b) => new Date(a.start) - new Date(b.start));
}

// Get sessions for a specific date
function getSessionsForDate(d) {
  const key = dateKey(d);
  return getSessions().filter(s => dateKey(new Date(s.start)) === key);
}

// Get sessions for a client
function getSessionsForClient(clientId) {
  return getSessions().filter(s => s.clientId === clientId);
}

// Get active packages for client (not used up, not expired)
function getActivePackagesForClient(clientId) {
  const packages = getList('packages').filter(p => p.clientId === clientId);
  const now = Date.now();
  return packages.filter(p => {
    const remaining = (p.totalSessions || 0) - (p.usedSessions || 0);
    if (remaining <= 0) return false;
    if (p.validUntil && p.validUntil < now) return false;
    return true;
  });
}

// Get all packages for client
function getAllPackagesForClient(clientId) {
  return getList('packages').filter(p => p.clientId === clientId)
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}

// Check if a time slot conflicts with existing sessions
function hasTimeConflict(startISO, endISO, excludeId) {
  const start = new Date(startISO).getTime();
  const end = new Date(endISO).getTime();
  const sessions = getSessions();
  return sessions.some(s => {
    if (s.id === excludeId) return false;
    if (s.status === 'cancelled') return false;
    const sStart = new Date(s.start).getTime();
    const sEnd = new Date(s.end || (sStart + 60*60*1000)).getTime();
    // Overlap check
    return (start < sEnd && end > sStart);
  });
}

// Compute client stats
function getClientStats(clientId) {
  const sessions = getSessionsForClient(clientId);
  const completed = sessions.filter(s => s.status === 'done');
  const trainings = completed.filter(s => s.type === 'training').length;
  const massages = completed.filter(s => s.type === 'massage_short' || s.type === 'massage_long').length;
  const consultations = completed.filter(s => s.type === 'consultation').length;
  
  const payments = getList('payments').filter(p => p.clientId === clientId);
  const totalPaid = payments.reduce((s, p) => s + (p.amount || 0), 0);
  
  // Client since
  const c = getClient(clientId);
  const since = c ? c.createdAt : null;
  
  return { total: completed.length, trainings, massages, consultations, totalPaid, since };
}

// Get type name from session
function getSessionTypeName(typeId) {
  const info = getSessionTypeInfo(typeId);
  return info.name;
}

// Get type CSS class
function getSessionTypeClass(typeId) {
  if (typeId === 'training') return 'training';
  if (typeId === 'massage_short' || typeId === 'massage_long') return 'massage';
  if (typeId === 'consultation') return 'consultation';
  return 'training';
}

// Compute money: total inkasováno (paid)
function getTotalInkasovano(filterFromTs) {
  const payments = getList('payments');
  return payments
    .filter(p => !filterFromTs || (p.at || 0) >= filterFromTs)
    .reduce((s, p) => s + (p.amount || 0), 0);
}

function getTotalExpenses(filterFromTs) {
  const exp = getList('expenses');
  return exp
    .filter(e => !filterFromTs || (e.at || 0) >= filterFromTs)
    .reduce((s, e) => s + (e.amount || 0), 0);
}

// ============================================================
// HOME / DNES
// ============================================================
function renderHome() {
  const now = new Date();
  const todayKey = dateKey(now);
  const dayNames = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
  const monthsGen = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  const dateStr = dayNames[now.getDay()] + ', ' + now.getDate() + '. ' + monthsGen[now.getMonth()];

  const myName = getMyName();
  const greeting = getGreeting();

  // Today's sessions
  const todaySessions = getSessionsForDate(now).filter(s => s.status !== 'cancelled');
  const todayDone = todaySessions.filter(s => s.status === 'done').length;
  const todayPlanned = todaySessions.filter(s => s.status !== 'done');
  const todayEarnings = getList('payments').filter(p => dateKey(new Date(p.at)) === todayKey).reduce((s, p) => s + (p.amount || 0), 0);

  // Birthdays today
  const birthdaysToday = getList('clients').filter(c => {
    if (!c.birthdate) return false;
    const bd = new Date(c.birthdate);
    return bd.getDate() === now.getDate() && bd.getMonth() === now.getMonth();
  });

  // Upcoming reminders
  const reminders = getList('reminders').filter(r => !r.done && (!r.at || r.at <= Date.now() + 24*60*60*1000)).sort((a,b) => (a.at||0) - (b.at||0));

  // Packages running low
  const clients = getList('clients');
  const lowPackages = [];
  clients.forEach(c => {
    const pkgs = getActivePackagesForClient(c.id);
    pkgs.forEach(p => {
      const remaining = (p.totalSessions || 0) - (p.usedSessions || 0);
      if (remaining <= 2 && remaining > 0) {
        lowPackages.push({ client: c, pkg: p, remaining });
      }
    });
  });

  let html = '<div class="app">';

  // Greeting
  html += '<div class="home-top">';
  html += '<div class="home-date">' + escapeHtml(dateStr) + '</div>';
  html += '<div class="home-greeting">' + escapeHtml(greeting) + ', <span class="italic accent">' + escapeHtml(myName) + '</span></div>';
  if (todaySessions.length === 0) {
    html += '<div class="home-subtitle">dnes máš volno — pohoda</div>';
  } else if (todayDone === todaySessions.length) {
    html += '<div class="home-subtitle">vše hotovo, super den!</div>';
  } else {
    html += '<div class="home-subtitle">čeká tě ' + todayPlanned.length + ' ' + (todayPlanned.length === 1 ? 'lekce' : todayPlanned.length < 5 ? 'lekce' : 'lekcí') + '</div>';
  }
  html += '</div>';

  // Stats grid
  html += '<div class="stat-grid">';
  html += '<div class="stat-card accent">';
  html += '<div class="stat-label">Lekcí dnes</div>';
  html += '<div class="stat-value">' + todaySessions.length + '</div>';
  if (todayDone > 0) html += '<div class="stat-sub">' + todayDone + ' hotovo</div>';
  html += '</div>';
  html += '<div class="stat-card">';
  html += '<div class="stat-label">Inkasováno</div>';
  html += '<div class="stat-value">' + fmtNumOnly(todayEarnings) + '</div>';
  html += '<div class="stat-sub">Kč dnes</div>';
  html += '</div>';
  html += '</div>';

  // Birthdays
  if (birthdaysToday.length > 0) {
    html += '<div class="section-label">N A R O Z E N I N Y &nbsp; D N E S 🎂</div>';
    html += '<div class="section-content">';
    birthdaysToday.forEach(c => {
      html += clientRowMini(c, 'narozky');
    });
    html += '</div>';
  }

  // Today's sessions
  html += '<div class="section-label">D N E Š N Í &nbsp; L E K C E</div>';
  html += '<div class="section-content">';
  if (todaySessions.length === 0) {
    html += '<div class="empty">Dnes není naplánovaná žádná lekce</div>';
    html += '<div class="empty-hint">Klepni na <strong>+</strong> dole vpravo a přidej termín</div>';
  } else {
    todaySessions.forEach(s => {
      html += renderSessionRow(s);
    });
  }
  html += '</div>';

  // Reminders
  if (reminders.length > 0) {
    html += '<hr class="hairline">';
    html += '<div class="section-label">P Ř I P O M Í N K Y</div>';
    html += '<div class="section-content">';
    reminders.slice(0, 3).forEach(r => {
      html += '<div class="session-row" onclick="markReminderDone(\'' + r.id + '\')">';
      html += '<div class="session-type-bar" style="background: var(--warning);"></div>';
      html += '<div class="session-time" style="min-width: 32px;">';
      html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 6px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      html += '</div>';
      html += '<div class="session-content">';
      html += '<div class="session-client-name">' + escapeHtml(r.text || 'Připomínka') + '</div>';
      if (r.at) html += '<div class="session-meta">' + escapeHtml(formatDateCZ(new Date(r.at)) + ' · ' + formatTimeCZ(new Date(r.at))) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Packages running low
  if (lowPackages.length > 0) {
    html += '<hr class="hairline">';
    html += '<div class="section-label">B A L Í Č K Y &nbsp; D O C H Á Z E J Í</div>';
    html += '<div class="section-content">';
    lowPackages.slice(0, 3).forEach(item => {
      html += '<div class="client-row" onclick="goDetail(\'client\', \'' + item.client.id + '\')">';
      html += '<div class="avatar size-md">' + escapeHtml(getInitial(item.client.name)) + '</div>';
      html += '<div class="client-content">';
      html += '<div class="client-name">' + escapeHtml(item.client.name) + '</div>';
      html += '<div class="client-meta">' + escapeHtml(item.pkg.name || 'balíček') + '</div>';
      html += '</div>';
      html += '<div class="client-package-pill warn">' + item.remaining + ' / ' + item.pkg.totalSessions + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Padding
  html += '<div style="padding: 32px 20px; text-align: center;">';
  html += '<div style="font-family: \'Instrument Serif\', serif; font-style: italic; color: var(--text-3); font-size: 12px;">Pulse · ' + escapeHtml(myName) + '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}

  const h = new Date().getHours();
  if (h < 5) return 'Dobrou noc';
  if (h < 11) return 'Dobré ráno';
  if (h < 17) return 'Dobrý den';
  if (h < 22) return 'Dobrý večer';

// Render session row (used in home + calendar)
function renderSessionRow(s) {
  const start = new Date(s.start);
  const end = s.end ? new Date(s.end) : new Date(start.getTime() + 60*60*1000);
  const display = getSessionDisplay(s);
  const typeClass = getCategoryIconClass(display.icon);
  const client = s.clientId ? getClient(s.clientId) : null;
  const clientName = client ? client.name : (s.clientName || 'Bez klienta');
  const isDone = s.status === 'done';
  const isCancelled = s.status === 'cancelled';
  const isReservation = s.status === 'reservation';

  let extraClass = '';
  if (isDone) extraClass += ' done';
  if (isCancelled) extraClass += ' done';
  if (isReservation) extraClass += ' reservation';

  let html = '<div class="session-row type-' + typeClass + extraClass + '" onclick="goDetail(\'session\', \'' + s.id + '\')">';
  html += '<div class="session-type-bar"></div>';
  html += '<div class="session-time">';
  html += formatTimeCZ(start);
  html += '<div class="session-time-end">' + formatTimeCZ(end) + '</div>';
  html += '</div>';
  html += '<div class="session-content">';
  html += '<div class="session-client-name">' + escapeHtml(clientName) + '</div>';
  html += '<div class="session-meta">';
  html += '<span class="session-type-pill ' + typeClass + '">' + escapeHtml(display.name) + '</span>';
  if (isReservation) {
    html += ' <span style="background: var(--surface-2); border: 1px dashed var(--text-3); padding: 2px 8px; border-radius: 999px; font-family: \'JetBrains Mono\', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); font-weight: 500; margin-left: 4px;">Rezervace</span>';
  }
  if (s.recurrenceGroup) html += ' <span style="color: var(--text-3); font-size: 11px;"> ↻</span>';
  if (s.location) html += ' · ' + escapeHtml(s.location);
  if (isDone) html += ' · <span style="color: var(--accent);">hotovo ✓</span>';
  if (isCancelled) html += ' · <span style="color: var(--text-3);">zrušeno</span>';
  html += '</div>';
  html += '</div>';
  html += '</div>';
  return html;
}


// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const now = new Date();
  if (!calendarSelectedDate) calendarSelectedDate = dateKey(now);
  const selDate = new Date(calendarSelectedDate);
  const monthsGen = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];

  let html = '<div class="app">';

  // Header
  html += '<div class="page-header">';
  if (calendarViewMode === 'month') {
    const monthNames = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
    html += '<div class="page-title">' + monthNames[selDate.getMonth()] + ' ' + selDate.getFullYear() + '</div>';
  } else {
    html += '<div class="page-title">' + selDate.getDate() + '. ' + monthsGen[selDate.getMonth()] + '</div>';
  }
  // View mode toggle
  html += '<button class="btn-icon" onclick="toggleCalView()" title="Přepnout pohled">';
  if (calendarViewMode === 'week') {
    html += '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="22"/><line x1="15" y1="10" x2="15" y2="22"/></svg>';
  } else {
    html += '<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
  }
  html += '</button>';
  html += '<button class="btn-icon" onclick="goToToday()" title="Dnes">';
  html += '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  html += '</button>';
  if (calendarViewMode === 'week') {
    html += '<button class="btn-icon" onclick="moveCalWeek(-7)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
    html += '<button class="btn-icon" onclick="moveCalWeek(7)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>';
  } else {
    html += '<button class="btn-icon" onclick="moveCalMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
    html += '<button class="btn-icon" onclick="moveCalMonth(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>';
  }
  html += '</div>';

  // Get sessions counts per day
  const sessionsByDay = {};
  getSessions().forEach(s => {
    if (s.status === 'cancelled') return;
    const k = dateKey(new Date(s.start));
    sessionsByDay[k] = (sessionsByDay[k] || 0) + 1;
  });

  if (calendarViewMode === 'month') {
    html += renderMonthView(selDate, sessionsByDay);
  } else {
    html += renderWeekView(selDate, sessionsByDay);
  }

  // Sessions for selected day
  const dayName = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'][selDate.getDay()];
  html += '<div class="section-label">' + dayName.toUpperCase().split('').join(' ') + ' &nbsp; &middot; &nbsp; ' + selDate.getDate() + '. ' + monthsGen[selDate.getMonth()] + '</div>';
  html += '<div class="section-content">';
  const sessions = getSessionsForDate(selDate);
  if (sessions.length === 0) {
    html += '<div class="empty">Žádná lekce v tento den</div>';
    html += '<div class="empty-hint">Klepni na <strong>+</strong> a přidej termín</div>';
  } else {
    sessions.forEach(s => {
      html += renderSessionRow(s);
    });
  }
  html += '</div>';

  html += '<div style="height: 100px;"></div>';
  html += '</div>';
  return html;
}

function renderWeekView(selDate, sessionsByDay) {
  const startOfWeek = new Date(selDate);
  const dayOfWeek = (selDate.getDay() + 6) % 7;
  startOfWeek.setDate(startOfWeek.getDate() - dayOfWeek);
  const dayNames = ['Po','Út','St','Čt','Pá','So','Ne'];
  const now = new Date();
  let html = '<div class="cal-week">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(startOfWeek);
    d.setDate(d.getDate() + i);
    const k = dateKey(d);
    const isToday = k === dateKey(now);
    const isSelected = k === calendarSelectedDate;
    const count = sessionsByDay[k] || 0;
    let classes = 'cal-day';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';
    html += '<button class="' + classes + '" onclick="selectCalDay(\'' + k + '\')">';
    html += '<div class="cal-day-name">' + dayNames[i] + '</div>';
    html += '<div class="cal-day-num">' + d.getDate() + '</div>';
    if (count > 0) {
      html += '<div class="cal-day-dots">';
      for (let j = 0; j < Math.min(count, 3); j++) {
        html += '<div class="cal-day-dot"></div>';
      }
      html += '</div>';
    }
    html += '</button>';
  }
  html += '</div>';
  return html;
}

function renderMonthView(selDate, sessionsByDay) {
  const year = selDate.getFullYear();
  const month = selDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7; // Mon = 0
  const daysInMonth = lastDay.getDate();
  const dayNames = ['Po','Út','St','Čt','Pá','So','Ne'];
  const now = new Date();

  let html = '<div style="padding: 0 16px 16px;">';

  // Day name header
  html += '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px;">';
  dayNames.forEach(n => {
    html += '<div style="text-align: center; font-family: \'JetBrains Mono\', monospace; font-size: 9px; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 0; font-weight: 600;">' + n + '</div>';
  });
  html += '</div>';

  // Grid of days
  html += '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">';

  // Empty cells before first day
  for (let i = 0; i < startOffset; i++) {
    html += '<div></div>';
  }

  // Days
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const k = dateKey(date);
    const isToday = k === dateKey(now);
    const isSelected = k === calendarSelectedDate;
    const count = sessionsByDay[k] || 0;
    let cellStyle = 'aspect-ratio: 1; background: var(--surface); border: 1px solid var(--hairline); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; padding: 4px;';
    if (isToday) cellStyle += ' border-color: var(--accent);';
    if (isSelected) cellStyle += ' background: var(--accent); border-color: var(--accent);';
    const dayNumColor = isSelected ? 'var(--bg)' : 'var(--text)';
    html += '<button onclick="selectCalDay(\'' + k + '\')" style="' + cellStyle + '">';
    html += '<div style="font-family: \'Inter\', sans-serif; font-size: 14px; font-weight: 600; color: ' + dayNumColor + ';">' + d + '</div>';
    if (count > 0) {
      const dotColor = isSelected ? 'var(--bg)' : 'var(--accent)';
      html += '<div style="display: flex; gap: 2px; margin-top: 4px;">';
      for (let j = 0; j < Math.min(count, 3); j++) {
        html += '<div style="width: 4px; height: 4px; border-radius: 50%; background: ' + dotColor + ';"></div>';
      }
      if (count > 3) {
        html += '<div style="font-family: \'JetBrains Mono\', monospace; font-size: 8px; color: ' + dotColor + ';">+' + (count - 3) + '</div>';
      }
      html += '</div>';
    }
    html += '</button>';
  }

  html += '</div>';
  html += '</div>';
  return html;
}

function toggleCalView() {
  calendarViewMode = calendarViewMode === 'week' ? 'month' : 'week';
  vibrate(10);
  renderScreen();
}

function moveCalMonth(months) {
  const d = new Date(calendarSelectedDate);
  d.setMonth(d.getMonth() + months);
  calendarSelectedDate = dateKey(d);
  vibrate(8);
  renderScreen();
}

function selectCalDay(key) {
  calendarSelectedDate = key;
  vibrate(8);
  renderScreen();
}

function moveCalWeek(days) {
  const d = new Date(calendarSelectedDate);
  d.setDate(d.getDate() + days);
  calendarSelectedDate = dateKey(d);
  vibrate(8);
  renderScreen();
}

function goToToday() {
  calendarSelectedDate = dateKey(new Date());
  vibrate(10);
  renderScreen();
}

// ============================================================
// CLIENTS
// ============================================================
function renderClients() {
  const allClients = getList('clients').sort((a, b) => (a.name || '').localeCompare(b.name || '', 'cs'));

  // Filter by search
  let clients = allClients;
  if (clientSearchQuery) {
    const q = clientSearchQuery.toLowerCase();
    clients = clients.filter(c => (c.name || '').toLowerCase().includes(q) || (c.phone || '').includes(q));
  }

  // Filter by tab
  if (currentFilter === 'with-package') {
    clients = clients.filter(c => getActivePackagesForClient(c.id).length > 0);
  } else if (currentFilter === 'without-package') {
    clients = clients.filter(c => getActivePackagesForClient(c.id).length === 0);
  }

  let html = '<div class="app">';

  html += '<div class="page-header">';
  html += '<div class="page-title">Klienti</div>';
  html += '<div style="font-family: \'JetBrains Mono\', monospace; color: var(--text-3); font-size: 12px;">' + allClients.length + '</div>';
  html += '</div>';

  // Search
  html += '<div style="padding: 0 20px 12px;">';
  html += '<input type="text" id="client-search" placeholder="Hledat klienta..." value="' + escapeHtml(clientSearchQuery) + '" oninput="onClientSearch(this.value)">';
  html += '</div>';

  // Filter chips
  html += '<div class="chips">';
  html += '<div class="chip ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setClientFilter(\'all\')">Všichni</div>';
  html += '<div class="chip ' + (currentFilter === 'with-package' ? 'active' : '') + '" onclick="setClientFilter(\'with-package\')">S balíčkem</div>';
  html += '<div class="chip ' + (currentFilter === 'without-package' ? 'active' : '') + '" onclick="setClientFilter(\'without-package\')">Bez balíčku</div>';
  html += '</div>';

  if (clients.length === 0) {
    html += '<div class="empty">Žádný klient nenalezen</div>';
    if (allClients.length === 0) {
      html += '<div class="empty-hint">Klepni na <strong>+</strong> dole vpravo a přidej prvního klienta</div>';
    }
  } else {
    html += '<div class="section-content">';
    clients.forEach(c => {
      html += renderClientRow(c);
    });
    html += '</div>';
  }

  html += '<div style="height: 100px;"></div>';
  html += '</div>';
  return html;
}

function renderClientRow(c) {
  const activePkgs = getActivePackagesForClient(c.id);
  const totalRemaining = activePkgs.reduce((s, p) => s + ((p.totalSessions || 0) - (p.usedSessions || 0)), 0);
  const totalCount = activePkgs.reduce((s, p) => s + (p.totalSessions || 0), 0);

  let pillHtml = '';
  if (activePkgs.length > 0) {
    const cls = totalRemaining <= 2 ? 'warn' : '';
    pillHtml = '<div class="client-package-pill ' + cls + '">' + totalRemaining + ' / ' + totalCount + '</div>';
  } else {
    pillHtml = '<div class="client-package-pill empty">—</div>';
  }

  let metaParts = [];
  if (c.phone) metaParts.push(c.phone);
  if (c.tone) metaParts.push(c.tone === 'tykani' ? 'tykání' : 'vykání');

  let html = '<div class="client-row" onclick="goDetail(\'client\', \'' + c.id + '\')">';
  html += '<div class="avatar size-md">' + escapeHtml(getInitial(c.name)) + '</div>';
  html += '<div class="client-content">';
  html += '<div class="client-name">' + escapeHtml(c.name) + '</div>';
  html += '<div class="client-meta">' + escapeHtml(metaParts.join(' · ')) + '</div>';
  html += '</div>';
  html += pillHtml;
  html += '</div>';
  return html;
}

function onClientSearch(v) {
  clientSearchQuery = v;
  // Don't full re-render to keep input focus; just refilter list
  const allClients = getList('clients').sort((a, b) => (a.name || '').localeCompare(b.name || '', 'cs'));
  let clients = allClients;
  if (v) {
    const q = v.toLowerCase();
    clients = clients.filter(c => (c.name || '').toLowerCase().includes(q) || (c.phone || '').includes(q));
  }
  if (currentFilter === 'with-package') clients = clients.filter(c => getActivePackagesForClient(c.id).length > 0);
  else if (currentFilter === 'without-package') clients = clients.filter(c => getActivePackagesForClient(c.id).length === 0);

  // Re-render only the list
  const screen = document.querySelector('.screen');
  const container = screen ? screen.querySelector('.section-content') : null;
  if (container) {
    let html = '';
    clients.forEach(c => { html += renderClientRow(c); });
    if (clients.length === 0) {
      container.parentElement.innerHTML = '<div class="empty">Žádný klient nenalezen</div>';
    } else {
      container.innerHTML = html;
    }
  } else {
    renderScreen();
  }
}

function setClientFilter(f) {
  currentFilter = f;
  vibrate(8);
  renderScreen();
}

// ============================================================
// CLIENT DETAIL
// ============================================================
function renderClientDetail() {
  if (!detailContext || detailContext.type !== 'client') return renderClients();
  const c = getClient(detailContext.id);
  if (!c) return renderClients();

  const stats = getClientStats(c.id);
  const activePkgs = getActivePackagesForClient(c.id);
  const allPkgs = getAllPackagesForClient(c.id);
  const sessions = getSessionsForClient(c.id);
  const upcomingSessions = sessions.filter(s => s.status !== 'cancelled' && s.status !== 'done' && new Date(s.start) >= new Date(Date.now() - 24*60*60*1000)).slice(0, 5);
  const pastSessions = sessions.filter(s => s.status === 'done').reverse().slice(0, 10);

  let html = '<div class="app">';

  html += '<button class="btn-icon" onclick="showEditClientSheet(\'' + c.id + '\')">';
  html += '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

  let tagline = [];
  if (c.tone) tagline.push(c.tone === 'tykani' ? 'tykání' : 'vykání');
  if (stats.since) {
    const since = new Date(stats.since);
    const monthsSince = Math.floor((Date.now() - stats.since) / (30 * 24 * 60 * 60 * 1000));
    if (monthsSince > 0) tagline.push('klient ' + monthsSince + (monthsSince === 1 ? ' měsíc' : monthsSince < 5 ? ' měsíce' : ' měsíců'));

  html += '</div>';

  // Communication icons
  html += '<div style="display: flex; justify-content: center; gap: 8px; padding: 0 20px 24px;">';
  if (c.phone) {

    html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
    html += '</a>';
    html += '<button class="contact-icon-btn" style="width: 44px; height: 44px;" onclick="openSMS(\'' + escapeHtml(c.id) + '\')" title="SMS">';
    html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    html += '</button>';
    html += '<button class="contact-icon-btn" style="width: 44px; height: 44px;" onclick="openWhatsApp(\'' + escapeHtml(c.id) + '\')" title="WhatsApp">';

      html += renderPackageCard(p);
    });

    html += '<div class="section-content">';
    pastPkgs.forEach(p => {
      html += renderPackageCard(p, true);
    });
    html += '</div>';
  }

  // Upcoming sessions

    html += '<hr class="hairline">';
    html += '<div class="section-label">N A D C H Á Z E J Í C Í &nbsp; T E R M Í N Y</div>';

    upcomingSessions.forEach(s => { html += renderSessionRow(s); });
    html += '</div>';
  }

  if (pastSessions.length > 0) {
    html += '<hr class="hairline">';
    html += '<div class="section-label">H I S T O R I E &nbsp; L E K C Í</div>';
    html += '<div class="section-content">';
    pastSessions.forEach(s => { html += renderSessionRow(s); });

function renderPackageCard(p, isPast) {
  const used = p.usedSessions || 0;
  const total = p.totalSessions || 0;
  const remaining = total - used;
  const progressPct = total > 0 ? (used / total) * 100 : 0;
  const isExpired = p.validUntil && p.validUntil < Date.now();
  const isLow = remaining <= 2 && !isExpired;
  let cls = 'package-card';
  if (isExpired || used >= total) cls += ' expired';
  if (isLow) cls += ' warn';

  let html = '<div class="' + cls + '" onclick="showEditPackageSheet(\'' + p.id + '\')">';
  html += '<div class="package-name">' + escapeHtml(p.name || 'Balíček') + '</div>';
  html += '<div class="package-stats">';
  html += '<div class="package-counter">' + remaining + '<span class="total"> / ' + total + '</span></div>';
  let metaParts = [];
  if (p.price) metaParts.push(fmtMoney(p.price));
  if (p.validUntil) {
    const until = new Date(p.validUntil);
    if (isExpired) metaParts.push('expirovalo');
    else metaParts.push('do ' + formatDateCZ(until));
  }
  html += '<div class="package-meta">' + escapeHtml(metaParts.join(' · ')) + '</div>';
  html += '</div>';
  html += '<div class="package-progress-bar" style="width: ' + progressPct + '%;"></div>';
  html += '</div>';
  return html;
}

      html += '</div>';
    });
  }
  html += '</div>';

  return html;
}

function renderFinMesicni() {
  // Compute monthly stats
  const sessions = getSessions().filter(s => s.status === 'done');
  const payments = getList('payments');

  // Group by month
  const byMonth = {};
  sessions.forEach(s => {
    const d = new Date(s.start);
    const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (!byMonth[k]) byMonth[k] = { trainings: 0, massages: 0, consultations: 0, sessions: 0 };
    byMonth[k].sessions++;
    if (s.type === 'training') byMonth[k].trainings++;
    else if (s.type === 'massage_short' || s.type === 'massage_long') byMonth[k].massages++;
    else if (s.type === 'consultation') byMonth[k].consultations++;
  });
  payments.forEach(p => {
    const d = new Date(p.at);
    const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (!byMonth[k]) byMonth[k] = { trainings: 0, massages: 0, consultations: 0, sessions: 0 };
    byMonth[k].earnings = (byMonth[k].earnings || 0) + (p.amount || 0);
  });

  const monthKeys = Object.keys(byMonth).sort().reverse();
  const months = ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];

  let html = '<div style="padding: 8px 20px;">';

  if (monthKeys.length === 0) {
    html += '<div class="empty">Zatím žádné měsíční přehledy</div>';
    html += '<div class="empty-hint">Přehled se vygeneruje, jakmile budou hotové lekce a platby</div>';
  } else {
    monthKeys.forEach(k => {
      const [year, month] = k.split('-');
      const m = byMonth[k];
      html += '<div style="background: var(--surface); border: 1px solid var(--hairline); border-radius: 16px; padding: 18px; margin-bottom: 12px;">';
      html += '<div style="font-family: \'Instrument Serif\', serif; font-style: italic; font-size: 15px; color: var(--text-2); margin-bottom: 4px;">' + months[parseInt(month) - 1] + ' ' + year + '</div>';
      html += '<div class="big-amount" style="font-size: 32px; margin-bottom: 12px;">' + fmtNumOnly(m.earnings || 0) + '<span class="currency">Kč</span></div>';
      html += '<div style="display: flex; gap: 16px; flex-wrap: wrap; font-family: \'JetBrains Mono\', monospace; font-size: 11px; color: var(--text-3); letter-spacing: 1px;">';
      if (m.trainings > 0) html += '<span><strong style="color: var(--accent);">' + m.trainings + '</strong> tréninků</span>';
      if (m.massages > 0) html += '<span><strong style="color: #C795F8;">' + m.massages + '</strong> masáží</span>';
      if (m.consultations > 0) html += '<span><strong style="color: var(--info);">' + m.consultations + '</strong> konzultací</span>';
      html += '</div>';
      html += '</div>';
    });
  }

  html += '</div>';
  return html;
}

function confirmDeleteFutureReservations(clientId) {

  `);

async function doDeleteFutureReservations(clientId) {
  const futureRes = getList('sessions').filter(s => {
    if (s.clientId !== clientId) return false;
    if (s.status !== 'reservation') return false;
    return new Date(s.start) >= new Date();
  });
  let count = 0;
  for (const s of futureRes) {
    await fb.ref('studios/' + userData.studioId + '/sessions/' + s.id).remove();
    count++;
  }
  closeSheet();
  showToast('Smazáno ' + count + ' rezervací');
}

async function deleteClient(id) {
  // Delete client + related sessions + packages
  await fb.ref('studios/' + userData.studioId + '/clients/' + id).remove();
  // Also delete related sessions and packages
  const sessions = getList('sessions').filter(s => s.clientId === id);
  for (const s of sessions) {
    await fb.ref('studios/' + userData.studioId + '/sessions/' + s.id).remove();
  }
  const pkgs = getList('packages').filter(p => p.clientId === id);
  for (const p of pkgs) {
    await fb.ref('studios/' + userData.studioId + '/packages/' + p.id).remove();
  }
  closeSheet();
  goBack();
  showToast('Smazáno', true);
}

async function addSession() {
  const categoryId = window._sessionCategoryId;
  const serviceId = window._sessionServiceId;
  const date = document.getElementById('ss-date').value;
  const time = document.getElementById('ss-time').value;
  const duration = parseInt(document.getElementById('ss-duration').value, 10) || 60;
  const clientId = document.getElementById('ss-client').value;
  const location = document.getElementById('ss-location-custom').value.trim();
  const priceInp = document.getElementById('ss-price').value;
  const price = priceInp ? parseFloat(priceInp) : 0;
  const notes = document.getElementById('ss-notes').value.trim();
  const repeat = window._repeat || 'none';
  const occurrences = (repeat !== 'none') ? Math.max(1, Math.min(parseInt((document.getElementById('ss-occurrences') || {}).value, 10) || 1, 100)) : 1;

  if (!serviceId) { showToast('Vyber službu', true); return; }
  if (!date || !time) { showToast('Vyplň datum a čas', true); return; }

  const dates = [];
  for (let i = 0; i < occurrences; i++) {
    const d = new Date(date + 'T' + time + ':00');
    if (repeat === 'weekly') d.setDate(d.getDate() + i * 7);
    else if (repeat === 'biweekly') d.setDate(d.getDate() + i * 14);
    else if (repeat === 'monthly') d.setMonth(d.getMonth() + i);
    else if (i > 0) break;
    dates.push(d);
  }

  // Conflict check on first
  const firstStart = dates[0].toISOString();
  const firstEnd = new Date(dates[0].getTime() + duration * 60 * 1000).toISOString();
  if (hasTimeConflict(firstStart, firstEnd)) {
    showToast('První termín se kryje s jiným!', true);
    vibrate([20, 50, 20]);
    return;
  }

  // Match active packages for this category
  const activePkgs = clientId ? getActivePackagesForClient(clientId) : [];
  const matchPkgs = activePkgs.filter(p => p.categoryId === categoryId || (!p.categoryId && p.type));
  const sortedMatchPkgs = matchPkgs.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

  const packageRemaining = {};
  sortedMatchPkgs.forEach(p => {
    packageRemaining[p.id] = (p.totalSessions || 0) - (p.usedSessions || 0);
  });

  const recGroup = repeat !== 'none' ? ('rec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5)) : null;

  let countLinked = 0;
  let countReservation = 0;
  let conflicts = 0;

  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    const start = d.toISOString();
    const end = new Date(d.getTime() + duration * 60 * 1000).toISOString();

    if (i > 0 && hasTimeConflict(start, end)) { conflicts++; continue; }

    let assignedPkg = null;
    for (const p of sortedMatchPkgs) {
      if (packageRemaining[p.id] > 0) {
        assignedPkg = p;
        packageRemaining[p.id]--;
        break;
      }
    }

    const data = {
      categoryId,
      serviceId,
      start, end,
      status: assignedPkg ? 'planned' : 'reservation',
      price: assignedPkg ? 0 : price,
      location: location || null,
      clientId: clientId || null,
      notes: notes || null,
      createdAt: Date.now(),
      createdBy: currentUser.uid
    };
    if (assignedPkg) {
      data.packageId = assignedPkg.id;
      countLinked++;
    } else {
      countReservation++;
    }
    if (recGroup) data.recurrenceGroup = recGroup;

    await fb.ref('studios/' + userData.studioId + '/sessions').push(data);
  }

  closeSheet();
  let msg = '';
  if (countLinked > 0) msg += countLinked + ' z balíčku';
  if (countReservation > 0) msg += (msg ? ' + ' : '') + countReservation + ' rezervace';
  if (conflicts > 0) msg += ' (' + conflicts + ' kolize přeskočena)';
  showToast(msg || 'Přidáno');
  if (currentScreen === 'calendar' || currentScreen === 'home') renderScreen();
}

  html += '</div>';

  setTimeout(() => { selectSessionType(s.type); }, 100);

async function updateSession(sessionId) {
  const type = window._sessionType;
  const date = document.getElementById('ss-date').value;
  const time = document.getElementById('ss-time').value;
  const duration = parseInt(document.getElementById('ss-duration').value, 10) || 60;
  const clientId = document.getElementById('ss-client').value;
  const location = document.getElementById('ss-location-custom').value.trim();
  const priceInp = document.getElementById('ss-price').value;
  const price = priceInp ? parseFloat(priceInp) : 0;
  const notes = document.getElementById('ss-notes').value.trim();

  if (!date || !time) { showToast('Vyplň datum a čas', true); return; }
  const start = new Date(date + 'T' + time + ':00').toISOString();
  const end = new Date(new Date(start).getTime() + duration * 60 * 1000).toISOString();

  if (hasTimeConflict(start, end, sessionId)) {
    showToast('V tento čas máš jiný termín!', true);
    vibrate([20, 50, 20]);
    return;
  }

  await fb.ref('studios/' + userData.studioId + '/sessions/' + sessionId).update({
    type, start, end, price,
    clientId: clientId || null,
    location: location || null,
    notes: notes || null
  });
  closeSheet();
  showToast('Uloženo');
}

async function markSessionDone(sessionId) {
  const sessions = studioData.sessions || {};
  const s = sessions[sessionId];
  if (!s) return;
  vibrate([10, 30, 10]);

  const updates = { status: 'done', doneAt: Date.now() };

  // Decrement package
  if (s.packageId) {
    const pkgs = studioData.packages || {};
    const pkg = pkgs[s.packageId];
    if (pkg) {
      const newUsed = (pkg.usedSessions || 0) + 1;
      await fb.ref('studios/' + userData.studioId + '/packages/' + s.packageId + '/usedSessions').set(newUsed);
    }
  } else if (s.price && s.price > 0) {
    // Add as one-off payment
    await fb.ref('studios/' + userData.studioId + '/payments').push({
      title: getSessionTypeName(s.type),
      amount: s.price,
      clientId: s.clientId || null,
      sessionId: sessionId,
      kind: 'session',
      at: Date.now()
    });
  }

  await fb.ref('studios/' + userData.studioId + '/sessions/' + sessionId).update(updates);
  showToast('✓ Hotovo');

  // Check if package depleted, suggest new
  if (s.packageId && s.clientId) {
    setTimeout(() => {
      const pkgs = studioData.packages || {};
      const pkg = pkgs[s.packageId];
      if (pkg) {
        const remaining = (pkg.totalSessions || 0) - (pkg.usedSessions || 0);
        if (remaining === 1) showToast('⚠ Klientovi zbývá poslední lekce!');
        else if (remaining === 0) showToast('Balíček vyčerpán — nabídni nový');
      }
    }, 800);
  }
}

async function undoSessionDone(sessionId) {
  const s = (studioData.sessions || {})[sessionId];
  if (!s) return;
  // Revert package
  if (s.packageId) {
    const pkgs = studioData.packages || {};
    const pkg = pkgs[s.packageId];
    if (pkg) {
      const newUsed = Math.max(0, (pkg.usedSessions || 0) - 1);
      await fb.ref('studios/' + userData.studioId + '/packages/' + s.packageId + '/usedSessions').set(newUsed);
    }
  }
  await fb.ref('studios/' + userData.studioId + '/sessions/' + sessionId).update({ status: 'planned', doneAt: null });
  showToast('Vráceno');
}
